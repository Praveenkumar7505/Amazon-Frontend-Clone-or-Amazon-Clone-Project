<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product Page</title>

<style>

body{

    font-family:Arial;
    background:#f3f3f3;
    margin:0;

}

.product-container{

    display:flex;
    gap:40px;
    padding:40px;
    background:white;
    margin:30px;

}

.product-image img{

    width:350px;

}

.product-details{

    max-width:500px;

}

.price{

    font-size:30px;
    color:#b12704;
    margin-top:20px;

}

button{

    height:45px;
    width:220px;
    margin-top:20px;
    border:none;
    border-radius:20px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;

}

.cart-btn{

    background:#ffd814;

}

.buy-btn{

    background:#ff9900;

}

.cart-btn,
.buy-btn{

    transition:0.3s;

}

.cart-btn:hover,
.buy-btn:hover{

    transform:scale(1.05);

}

</style>

</head>

<body>

<div class="product-container">

    <div class="product-image">

        <img src="box4_image.jpg">

    </div>

    <div class="product-details">

        <h1>

        Samsung S24 Ultra

        </h1>
        <div class="rating">

        ★★★★☆ 4.5

        </div>

        <p>

        Powerful smartphone with
        high-end camera and display.

        </p>
        

        <div class="price">

        ₹50000

        </div>
        <p class="delivery">

        FREE Delivery Tomorrow

        </p>

        <button class="cart-btn">

        Add to Cart

        </button>

        <br>

        <button class="buy-btn">

        Buy Now

        </button>

    </div>

</div>

</body>

</html>
