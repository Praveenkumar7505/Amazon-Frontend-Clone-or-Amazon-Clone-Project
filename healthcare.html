<!DOCTYPE html>
<html lang="en">

<head>

<title>Health Care</title>

<style>

body{
    font-family:Arial;
    background:#f3f3f3;
}

.product-container{
    display:flex;
    gap:40px;
    padding:40px;
    background:white;
    margin:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.product-image img{
    width:350px;
}

.price{
    color:#b12704;
    font-size:30px;
    margin-top:15px;
}

.rating{
    color:#ff9900;
    font-size:22px;
}

.delivery{
    color:green;
    font-size:20px;
    margin-top:10px;
}

button{
    height:45px;
    width:220px;
    margin-top:20px;
    border:none;
    border-radius:20px;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

.cart-btn{
    background:#ffd814;
}

.buy-btn{
    background:#ff9900;
}

.cart-btn,
.buy-btn{

    transition:0.3s;

}

.cart-btn:hover,
.buy-btn:hover{

    transform:scale(1.05);

}

</style>

</head>

<body>

<div class="product-container">

<div class="product-image">

<img src="box2_image.jpg">

</div>

<div>

<h1>Health & Personal Care Kit</h1>

<div class="rating">
★★★★☆ 4.3
</div>

<p>
Best daily health and personal care products.
</p>

<div class="price">
₹500
</div>

<p class="delivery">
FREE Delivery Tomorrow
</p>

<button class="cart-btn">
Add to Cart
</button>

<br>

<button class="buy-btn">
Buy Now
</button>

</div>

</div>

</body>
</html>
