<!DOCTYPE html>
<html lang="en">

<head>

<title>Furniture</title>

<style>

body{
    font-family:Arial;
    background:#f3f3f3;
}

.product-container{
    display:flex;
    gap:40px;
    padding:40px;
    background:white;
    margin:30px;
    border-radius:20px;
}

.product-image img{
    width:350px;
}

.price{
    color:#b12704;
    font-size:30px;
}

button{
    height:45px;
    width:220px;
    margin-top:20px;
    border:none;
    border-radius:20px;
    font-size:18px;
}

.cart-btn{
    background:#ffd814;
}

.buy-btn{
    background:#ff9900;
}

.cart-btn,
.buy-btn{

    transition:0.3s;

}

.cart-btn:hover,
.buy-btn:hover{

    transform:scale(1.05);

}

</style>

</head>

<body>

<div class="product-container">

<div class="product-image">

<img src="box3_image.jpg">

</div>

<div>

<h1>Wooden Sofa Set</h1>

<p>
Premium quality wooden furniture for home.
</p>

<div class="price">
₹12000
</div>

<button class="cart-btn">
Add to Cart
</button>

<br>

<button class="buy-btn">
Buy Now
</button>

</div>

</div>

</body>
</html>
