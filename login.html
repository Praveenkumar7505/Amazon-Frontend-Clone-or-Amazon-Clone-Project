<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f3f3f3;
    font-family:Arial;

}

.login-box{

    background:white;
    padding:30px;
    width:300px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);

}

input{

    width:100%;
    height:40px;
    margin-top:15px;
    padding-left:10px;

}

button{

    width:100%;
    height:40px;
    margin-top:20px;
    background:#ffd814;
    border:none;
    cursor:pointer;
    font-weight:bold;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="email"
placeholder="Enter Email">

<input type="password"
placeholder="Enter Password">

<button onclick="login()">
    Login
</button>

<p id="message"></p>

</div>

<script>

function login(){

    let email =
    document.querySelector("input[type='email']").value;

    let password =
    document.querySelector("input[type='password']").value;

    if(email === "" || password === ""){

        document.getElementById("message")
        .innerText =
        "Please fill all fields";

    }
    else{

        localStorage.setItem("amazonUser", email);

        document.getElementById("message")
        .innerText =
        "Login Successful";

        setTimeout(function(){

            window.location.href =
            "index.html";

        },2000);

    }

}

</script>
</body>
</html>
